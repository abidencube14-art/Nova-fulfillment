<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nova Fulfillment</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <header>

        <h1>Nova Fulfillment</h1>

        <p>Your Smart Order Manager</p>

    </header>

    <section class="stats">

        <div class="card">

            <h3>📦 Orders Today</h3>

            <span id="orders">0</span>

        </div>

        <div class="card">

            <h3>🚚 Pending</h3>

            <span id="pending">0</span>

        </div>

        <div class="card">

            <h3>💰 Revenue</h3>

            <span id="revenue">$0.00</span>

        </div>

        <div class="card">

            <h3>📈 Profit</h3>

            <span id="profit">$0.00</span>

        </div>

    </section>

    <section class="recent-orders">

        <h2>Recent Orders</h2>

        <div id="ordersList">

            <div class="empty">

                No orders yet...

            </div>

        </div>

    </section>

    <section class="supplier-status">

        <h2>Supplier Status</h2>

        <div class="supplier">

            <span>🟢 AliExpress</span>

            <small>Waiting for connection...</small>

        </div>

    </section>

    <footer>

        Nova Fulfillment v1.0

    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
